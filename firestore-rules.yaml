rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    
    // Allow authenticated users and public read access
    match /students/{studentId} {
      allow read: if true; // Public read access for student info
      allow create: if request.auth != null; // Only authenticated users can register
      allow update, delete: if request.auth != null && resource.data.class_id == request.auth.token.class_id;
    }

    match /attendance/{attendanceId} {
      allow read: if true; // Public read access to attendance records
      allow create: if request.auth != null; // Cloud Functions will write this
      allow update: if request.auth != null;
      allow delete: if false; // Never delete attendance records
    }

    // Prevent access to other collections
    match /{document=**} {
      allow read, write: if false;
    }
  }
}
