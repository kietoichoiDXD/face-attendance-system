name: Deploy Firebase Services

on:
  push:
    branches:
      - main
      - feature/update-20260403
      - feature/mobile-responsive-secure
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: bdien-muonmay
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt
        working-directory: backend

      - name: Validate required secrets
        shell: bash
        run: |
          if [ -z "${{ secrets.GCP_SA_KEY }}" ]; then
            echo "::error::Missing or empty secret: GCP_SA_KEY"
            exit 1
          fi
          if [ -z "${{ secrets.FIREBASE_PROJECT_ID }}" ]; then
            echo "::error::Missing or empty secret: FIREBASE_PROJECT_ID"
            exit 1
          fi

      - name: Validate GCP key JSON shape
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys

          raw = os.environ.get("GCP_SA_KEY", "")
          if not raw:
              print("::error::GCP_SA_KEY is empty")
              sys.exit(1)

          try:
              data = json.loads(raw)
          except Exception:
              print("::error::GCP_SA_KEY is not valid JSON")
              sys.exit(1)

          required = ["type", "project_id", "private_key", "client_email"]
          missing = [k for k in required if not data.get(k)]
          if missing:
              print("::error::GCP_SA_KEY missing fields: " + ", ".join(missing))
              sys.exit(1)

          if data.get("type") != "service_account":
              print("::error::GCP_SA_KEY type must be service_account")
              sys.exit(1)

          if data.get("project_id") != os.environ.get("FIREBASE_PROJECT_ID"):
              print("::error::GCP_SA_KEY project_id does not match FIREBASE_PROJECT_ID")
              sys.exit(1)
          PY

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ secrets.FIREBASE_PROJECT_ID }}

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Verify deploy inputs
        run: |
          python - <<'PY'
          import json
          import os
          import sys

          config_path = "firebase.json"
          if not os.path.isfile(config_path):
              print("::error::firebase.json not found at repository root")
              sys.exit(1)

          with open(config_path, "r", encoding="utf-8") as f:
              config = json.load(f)

          hosting = config.get("hosting")
          if not isinstance(hosting, dict):
              print("::error::firebase.json must contain a 'hosting' object")
              sys.exit(1)

          public_dir = hosting.get("public")
          if not public_dir:
              print("::error::firebase.json hosting.public is missing")
              sys.exit(1)

          if not os.path.isdir(public_dir):
              print(f"::error::hosting.public directory does not exist: {public_dir}")
              sys.exit(1)
          PY

      - name: Verify Firebase auth
        run: firebase projects:list --json > /dev/null

      - name: Deploy to Firebase
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_PROJECT_NUMBER: ${{ secrets.FIREBASE_PROJECT_NUMBER }}
        run: firebase deploy --config firebase.json --project "$FIREBASE_PROJECT_ID" --only hosting --non-interactive
