version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials.json
    volumes:
      # If they have a credentials file locally
      - ./backend/credentials.json:/app/credentials.json:ro

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:8080
    ports:
      - "3000:8080"
    depends_on:
      - backend
