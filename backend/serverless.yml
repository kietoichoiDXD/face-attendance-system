service: face-attendance-system
frameworkVersion: '3'

plugins:
  - serverless-python-requirements

provider:
  name: aws
  runtime: python3.13
  region: us-east-1
  logRetentionInDays: 14
  environment:
    STUDENTS_TABLE: ${self:custom.studentsTable}
    ATTENDANCE_TABLE: ${self:custom.attendanceTable}
    CLASSES_TABLE: ${self:custom.classesTable}
    STUDENT_FACES_BUCKET: ${self:custom.studentFacesBucket}
    CLASS_UPLOADS_BUCKET: ${self:custom.classUploadsBucket}
    REKOGNITION_COLLECTION_ID: face-attendance-collection
    VISION_PROVIDER: google
    GCP_PROJECT_ID: ${env:GCP_PROJECT_ID, 'bdien-muonmay'}
    GCP_SERVICE_ACCOUNT_JSON: ${env:GCP_SERVICE_ACCOUNT_JSON, ''}
    GCP_SERVICE_ACCOUNT_JSON_B64: ${env:GCP_SERVICE_ACCOUNT_JSON_B64, ''}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:Scan
            - dynamodb:Query
            - dynamodb:UpdateItem
          Resource:
            - "arn:aws:dynamodb:${self:provider.region}:*:table/${self:custom.studentsTable}"
            - "arn:aws:dynamodb:${self:provider.region}:*:table/${self:custom.attendanceTable}"
            - "arn:aws:dynamodb:${self:provider.region}:*:table/${self:custom.classesTable}"
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
            - s3:ListBucket
          Resource:
            - "arn:aws:s3:::${self:custom.studentFacesBucket}"
            - "arn:aws:s3:::${self:custom.classUploadsBucket}"
            - "arn:aws:s3:::${self:custom.studentFacesBucket}/*"
            - "arn:aws:s3:::${self:custom.classUploadsBucket}/*"
        - Effect: Allow
          Action:
            - rekognition:IndexFaces
            - rekognition:SearchFacesByImage
            - rekognition:CreateCollection
            - rekognition:CompareFaces
          Resource: "*"

custom:
  pythonRequirements:
    dockerizePip: non-linux
    slim: true
  studentsTable: students-${sls:stage}
  attendanceTable: attendance-${sls:stage}
  classesTable: classes-${sls:stage}
  studentFacesBucket: face-attendance-students-${sls:stage}
  classUploadsBucket: face-attendance-classes-${sls:stage}

functions:
  registerStudent:
    handler: src/register_student.handler
    events:
      - httpApi:
          path: /students/{student_id}/face
          method: post

  requestAttendanceUploadUrl:
    handler: src/request_upload_url.handler
    events:
      - httpApi:
          path: /classes/{class_id}/attendance/upload-url
          method: post

  processAttendance:
    handler: src/process_attendance.handler
    events:
      - httpApi:
          path: /classes/{class_id}/attendance
          method: post

  processUploadedAttendance:
    handler: src/process_uploaded_attendance.handler
    events:
      - s3:
          bucket: ${self:custom.classUploadsBucket}
          event: s3:ObjectCreated:Put

  getAttendance:
    handler: src/get_attendance.handler
    events:
      - httpApi:
          path: /attendance/{attendance_id}
          method: get

  getAnalytics:
    handler: src/analytics.handler
    events:
      - httpApi:
          path: /analytics
          method: get

  exportCsv:
    handler: src/export_csv.handler
    events:
      - httpApi:
          path: /attendance/export
          method: get

resources:
  Resources:
    StudentsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.studentsTable}
        AttributeDefinitions:
          - AttributeName: student_id
            AttributeType: S
        KeySchema:
          - AttributeName: student_id
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST

    AttendanceTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.attendanceTable}
        AttributeDefinitions:
          - AttributeName: attendance_id
            AttributeType: S
        KeySchema:
          - AttributeName: attendance_id
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST

    ClassesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.classesTable}
        AttributeDefinitions:
          - AttributeName: class_id
            AttributeType: S
        KeySchema:
          - AttributeName: class_id
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST

    StudentFacesBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:custom.studentFacesBucket}
        CorsConfiguration:
          CorsRules:
            - AllowedHeaders: ["*"]
              AllowedMethods: ["PUT", "POST"]
              AllowedOrigins: ["*"]

    ClassUploadsBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:custom.classUploadsBucket}
        CorsConfiguration:
          CorsRules:
            - AllowedHeaders: ["*"]
              AllowedMethods: ["PUT", "POST", "GET"]
              AllowedOrigins: ["*"]
